<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>John Doe — Contact</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0b0c0e;
      --surface:  #111316;
      --border:   #1f2228;
      --accent:   #c8a96e;
      --accent2:  #7eb8a4;
      --text:     #e8e4dc;
      --muted:    #5a5f6a;
      --card-w:   420px;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Mono', monospace;
      color: var(--text);
      overflow: hidden;
      position: relative;
    }

    /* Ambient background blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: .18;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #c8a96e, transparent 70%);
      top: -100px; left: -100px;
      animation: drift1 12s ease-in-out infinite alternate;
    }
    body::after {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #7eb8a4, transparent 70%);
      bottom: -80px; right: -80px;
      animation: drift2 15s ease-in-out infinite alternate;
    }
    @keyframes drift1 { to { transform: translate(60px, 80px); } }
    @keyframes drift2 { to { transform: translate(-60px, -60px); } }

    /* Card */
    .card {
      position: relative;
      z-index: 1;
      width: var(--card-w);
      max-width: calc(100vw - 32px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 48px 40px 40px;
      animation: fadeUp .8s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Corner accents */
    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      border-color: var(--accent);
      border-style: solid;
    }
    .card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .card::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    /* Avatar */
    .avatar-wrap {
      display: flex;
      align-items: flex-end;
      gap: 20px;
      margin-bottom: 28px;
    }
    .avatar {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, #c8a96e 0%, #7eb8a4 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 600;
      color: #0b0c0e;
      flex-shrink: 0;
      letter-spacing: 1px;
    }
    .name-block { flex: 1; }
    .name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 300;
      letter-spacing: .5px;
      line-height: 1.1;
      color: var(--text);
    }
    .title-tag {
      margin-top: 4px;
      font-size: 10px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--accent);
    }

    /* Divider */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, var(--accent) 0%, transparent 100%);
      margin-bottom: 28px;
      opacity: .5;
    }

    /* Fields */
    .fields { display: flex; flex-direction: column; gap: 16px; margin-bottom: 36px; }
    .field {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      animation: fadeUp .8s cubic-bezier(.16,1,.3,1) both;
    }
    .field:nth-child(1) { animation-delay: .1s; }
    .field:nth-child(2) { animation-delay: .18s; }
    .field:nth-child(3) { animation-delay: .26s; }
    .field:nth-child(4) { animation-delay: .34s; }
    .field:nth-child(5) { animation-delay: .42s; }

    .field-icon {
      width: 32px; height: 32px;
      border: 1px solid var(--border);
      border-radius: 2px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      color: var(--accent);
      font-size: 13px;
    }
    .field-body { flex: 1; padding-top: 2px; }
    .field-label {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2px;
    }
    .field-value {
      font-size: 13px;
      color: var(--text);
      word-break: break-all;
    }
    a.field-value {
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color .2s, color .2s;
    }
    a.field-value:hover { color: var(--accent2); border-color: var(--accent2); }

    /* Save button */
    .save-btn {
      width: 100%;
      padding: 14px 0;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: color .3s;
    }
    .save-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent);
      transform: translateX(-101%);
      transition: transform .35s cubic-bezier(.16,1,.3,1);
      z-index: 0;
    }
    .save-btn:hover::before { transform: translateX(0); }
    .save-btn:hover { color: #0b0c0e; }
    .save-btn span { position: relative; z-index: 1; }

    /* Pulse on success */
    .save-btn.saved {
      border-color: var(--accent2);
      color: var(--accent2);
      pointer-events: none;
    }
    .save-btn.saved::before { background: transparent; }

    /* Footer */
    .footer {
      margin-top: 24px;
      text-align: center;
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
    }
  </style>
</head>
<body>

<div class="card">
  <div class="avatar-wrap">
    <div class="avatar" id="initials">JD</div>
    <div class="name-block">
      <div class="name" id="fullname">John Doe</div>
      <div class="title-tag" id="jobtitle">Senior Product Designer · Acme Inc.</div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="fields">
    <div class="field">
      <div class="field-icon">📞</div>
      <div class="field-body">
        <div class="field-label">Phone</div>
        <a class="field-value" id="phone" href="tel:+11234567890">+1 (123) 456-7890</a>
      </div>
    </div>
    <div class="field">
      <div class="field-icon">✉</div>
      <div class="field-body">
        <div class="field-label">Email</div>
        <a class="field-value" id="email" href="mailto:john@acmeinc.com">john@acmeinc.com</a>
      </div>
    </div>
    <div class="field">
      <div class="field-icon">🌐</div>
      <div class="field-body">
        <div class="field-label">Website</div>
        <a class="field-value" id="website" href="https://johndoe.com" target="_blank">johndoe.com</a>
      </div>
    </div>
    <div class="field">
      <div class="field-icon">🏢</div>
      <div class="field-body">
        <div class="field-label">Company</div>
        <div class="field-value" id="company">Acme Inc.</div>
      </div>
    </div>
    <div class="field">
      <div class="field-icon">📍</div>
      <div class="field-body">
        <div class="field-label">Location</div>
        <div class="field-value" id="location">San Francisco, CA · USA</div>
      </div>
    </div>
  </div>

  <button class="save-btn" id="saveBtn" onclick="saveContact()">
    <span id="btnText">⬇ Save to Contacts</span>
  </button>

  <div class="footer">Tap to save · vCard 3.0</div>
</div>

<script>
  // ─── Contact Data ────────────────────────────────────────────────────────────
  // In a real app, this object would be populated dynamically from your backend
  // (e.g. fetched via the page's URL slug: /contact/john-doe)
  const contact = {
    firstName:  "John",
    lastName:   "Doe",
    fullName:   "John Doe",
    title:      "Senior Product Designer",
    company:    "Acme Inc.",
    phone:      "+11234567890",
    phoneFormatted: "+1 (123) 456-7890",
    email:      "john@acmeinc.com",
    website:    "https://johndoe.com",
    websiteDisplay: "johndoe.com",
    address:    "San Francisco, CA, USA",
    note:       "Scanned via digital business card"
  };

  // ─── Populate Page ────────────────────────────────────────────────────────────
  document.getElementById('initials').textContent =
    contact.firstName[0] + contact.lastName[0];
  document.getElementById('fullname').textContent  = contact.fullName;
  document.getElementById('jobtitle').textContent  = `${contact.title} · ${contact.company}`;
  document.getElementById('phone').textContent     = contact.phoneFormatted;
  document.getElementById('phone').href            = `tel:${contact.phone}`;
  document.getElementById('email').textContent     = contact.email;
  document.getElementById('email').href            = `mailto:${contact.email}`;
  document.getElementById('website').textContent   = contact.websiteDisplay;
  document.getElementById('website').href          = contact.website;
  document.getElementById('company').textContent   = contact.company;
  document.getElementById('location').textContent  = contact.address;

  // ─── Auto-download on page load ───────────────────────────────────────────────
  window.addEventListener('load', () => saveContact());

  // ─── Generate & Download .vcf ─────────────────────────────────────────────────
  function saveContact() {
    const vcard = [
      "BEGIN:VCARD",
      "VERSION:3.0",
      `FN:${contact.fullName}`,
      `N:${contact.lastName};${contact.firstName};;;`,
      `ORG:${contact.company}`,
      `TITLE:${contact.title}`,
      `TEL;TYPE=CELL:${contact.phone}`,
      `EMAIL;TYPE=WORK:${contact.email}`,
      `URL:${contact.website}`,
      `ADR;TYPE=WORK:;;${contact.address};;;;`,
      `NOTE:${contact.note}`,
      "END:VCARD"
    ].join("\n");

    const blob = new Blob([vcard], { type: "text/vcard;charset=utf-8" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href     = url;
    a.download = `${contact.firstName}_${contact.lastName}.vcf`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    // Visual feedback
    const btn = document.getElementById('saveBtn');
    const txt = document.getElementById('btnText');
    btn.classList.add('saved');
    txt.textContent = '✓ Contact Saved';
  }
</script>
</body>
</html>
